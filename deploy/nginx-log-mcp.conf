# Add this to the box.makkib.com server block alongside CenterDevice and Bidrento MCP locations
# Path: /etc/nginx/sites-available/box.makkib.com (or equivalent)

# Log MCP Server - SSE endpoint
location /logs/mcp/sse {
    proxy_pass http://127.0.0.1:3850/sse;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400;
    chunked_transfer_encoding on;
}

# Log MCP Server - message endpoint
location /logs/mcp/messages {
    proxy_pass http://127.0.0.1:3850/messages;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Log MCP Server - health check
location /logs/mcp/health {
    proxy_pass http://127.0.0.1:3850/health;
}
